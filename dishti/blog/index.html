<!DOCTYPE html>
<html lang="en" class="blog-layout" data-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thought Archive — Dishti Patel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;700&family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/blog-system.css">
</head>

<body class="blog-archive-page">
  <div id="scroll-progress"></div>

  <div id="loader-wrapper">
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
  </div>

  <div id="planet-container">
    <div class="planet"></div>
  </div>
  <div id="nebula-container"></div>
  <div id="star-background"></div>
  <canvas id="constellation-canvas"></canvas>
  <div id="shooting-star-container"></div>
  <nav class="blog-nav" aria-label="Blog">
    <div class="blog-nav-links">
      <a href="../dark/index.html">Portfolio</a>
      <a href="index.html" aria-current="page">Thought Archive</a>
    </div>
    <label class="theme-toggle" title="Open light theme archive">
      <input type="checkbox" id="theme-switch">
      <span class="toggle-slider">
        <span class="toggle-icon moon">🌙</span>
        <span class="toggle-icon sun">☀️</span>
      </span>
    </label>
  </nav>

  <header class="blog-archive-hero hero">
    <div class="header-content">
      <p class="small-intro">Thoughts, moments, and quiet experiments.</p>
      <h1 class="fade-up title">THOUGHTS ARCHIVE</h1>
      <hr style="width:48px; margin: 18px auto; border-color: rgba(255,255,255,0.12);">
      <p class="blog-archive-dek subtitle">ideas, experiments, reflections</p>
    </div>

    <a href="#blog-archive-grid" class="scroll-indicator" aria-label="Scroll to archive">
      <span>Scroll</span>
      <div class="scroll-indicator-arrow"></div>
    </a>
  </header>

  <div class="blog-filter-row" role="toolbar" aria-label="Sort ideas by category">
    <button type="button" class="blog-filter-btn is-active" data-filter="all">Everything</button>
    <button type="button" class="blog-filter-btn" data-filter="moments">Moments</button>
    <button type="button" class="blog-filter-btn" data-filter="milestones">Milestones</button>
    <button type="button" class="blog-filter-btn" data-filter="reflections">Reflections</button>
    <button type="button" class="blog-filter-btn" data-filter="journeys">Journeys</button>
    <div id="filter-hint" class="filter-hint" aria-hidden="true">Hover a filter for a gentle hint</div>
  </div>

  <div id="blog-archive-grid" class="blog-archive-masonry"></div>

  <script src="../js/blog-data.js"></script>
  <script defer src="../js/blog-archive.js"></script>
  <script defer src="../js/index.js"></script>
  <script defer src="../js/blog-orbit.js"></script>
  <script>
    (function () {
      var sw = document.getElementById('theme-switch');
      if (!sw) return;
      sw.checked = false;
      sw.addEventListener('change', function () {
        if (sw.checked) window.location.href = '../light/blog/index-day.html';
      });
    })();
  </script>
</body>

</html>
